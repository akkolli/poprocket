name: PopRocket
options:
  bundleIdPrefix: com.poprocket
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: LKT3G257FR
    MARKETING_VERSION: 0.1.0
    SWIFT_VERSION: 5.0
targets:
  PopRocketKit:
    type: framework
    platform: iOS
    sources:
      - path: Sources/PopRocketKit
    info:
      path: Supporting/PopRocketKit-Info.plist
      properties:
        CFBundleDisplayName: PopRocketKit
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.poprocket.app.kit

  PopRocketIntents:
    type: framework
    platform: iOS
    sources:
      - path: Sources/PopRocketIntents
    dependencies:
      - target: PopRocketKit
    info:
      path: Supporting/PopRocketIntents-Info.plist
      properties:
        CFBundleDisplayName: PopRocketIntents
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.poprocket.app.intents

  PopRocket:
    type: application
    platform: iOS
    sources:
      - path: Sources/PopRocketApp
    dependencies:
      - target: PopRocketKit
        embed: true
        codeSign: true
      - target: PopRocketIntents
        embed: true
        codeSign: true
      - target: PopRocketWidgetExtension
        embed: true
      - target: PopRocketNotificationService
        embed: true
    info:
      path: Supporting/PopRocket-Info.plist
      properties:
        CFBundleDisplayName: PopRocket
        CFBundleURLTypes:
          - CFBundleURLName: com.poprocket.app
            CFBundleURLSchemes:
              - poprocket
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        PopRocketKeychainAccessGroup: $(AppIdentifierPrefix)com.poprocket.app
        NSCameraUsageDescription: PopRocket uses the camera to scan bridge pairing QR codes.
        NSLocalNetworkUsageDescription: PopRocket connects to your local bridge to run homelab actions.
        UIRequiresFullScreen: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: Supporting/PopRocket.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.poprocket.app
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.poprocket.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.poprocket.app

  PopRocketWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/PopRocketWidget
    dependencies:
      - target: PopRocketKit
        embed: true
        codeSign: true
      - target: PopRocketIntents
        embed: true
        codeSign: true
    info:
      path: Supporting/PopRocketWidgetExtension-Info.plist
      properties:
        CFBundleDisplayName: PopRocket Widget
        PopRocketKeychainAccessGroup: $(AppIdentifierPrefix)com.poprocket.app
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Supporting/PopRocketWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.poprocket.app
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.poprocket.app
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.poprocket.app.widget
        SKIP_INSTALL: YES

  PopRocketNotificationService:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/PopRocketNotificationService
    dependencies:
      - target: PopRocketKit
        embed: true
        codeSign: true
    info:
      path: Supporting/PopRocketNotificationService-Info.plist
      properties:
        CFBundleDisplayName: PopRocket Notification Service
        PopRocketKeychainAccessGroup: $(AppIdentifierPrefix)com.poprocket.app
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    entitlements:
      path: Supporting/PopRocketNotificationService.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.poprocket.app
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.poprocket.app
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.poprocket.app.notification-service
        SKIP_INSTALL: YES

  PopRocketKitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/PopRocketKitTests
    dependencies:
      - target: PopRocketKit
    info:
      path: Supporting/PopRocketKitTests-Info.plist
      properties:
        CFBundleDisplayName: PopRocketKitTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.poprocket.app.tests

schemes:
  PopRocket:
    build:
      targets:
        PopRocket: all
        PopRocketWidgetExtension: all
        PopRocketNotificationService: all
        PopRocketKitTests: [test]
    run:
      config: Debug
      executable: PopRocket
    test:
      config: Debug
      targets:
        - PopRocketKitTests
