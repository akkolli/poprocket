services:
  relay-data-init:
    image: busybox:1.36
    command: ["sh", "-c", "chown -R 65532:65532 /data"]
    volumes:
      - relay-data:/data

  relay:
    build:
      context: ./services/relay
    environment:
      POPROCKET_RELAY_ADDR: ":8081"
      POPROCKET_APNS_MODE: "log"
      POPROCKET_RELAY_TOKEN: "dev-relay-token"
      POPROCKET_RELAY_DATA_PATH: "/var/lib/poprocket/relay-state.json"
    depends_on:
      relay-data-init:
        condition: service_completed_successfully
    volumes:
      - relay-data:/var/lib/poprocket
    ports:
      - "8081:8081"

  bridge-data-init:
    image: busybox:1.36
    command: ["sh", "-c", "chown -R 10001:10001 /data"]
    volumes:
      - bridge-data:/data

  bridge:
    build:
      context: ./services/bridge
    depends_on:
      relay:
        condition: service_started
      bridge-data-init:
        condition: service_completed_successfully
    environment:
      POPROCKET_BRIDGE_CONFIG: "/etc/poprocket/bridge.yaml"
      POPROCKET_BRIDGE_ADDR: ":6567"
    volumes:
      - ./configs/bridge.example.yaml:/etc/poprocket/bridge.yaml:ro
      - bridge-data:/var/lib/poprocket
    ports:
      - "6567:6567"

volumes:
  bridge-data:
  relay-data:
