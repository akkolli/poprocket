bridge:
  id: "bridge-dev"
  name: "PopRocket Dev Bridge"
  public_url: "http://localhost:8080"
  direct_urls:
    - "http://localhost:8080"
    - "http://bridge.local:8080"
  data_path: "/var/lib/poprocket/poprocket.db"

relay:
  url: "http://relay:8081"
  websocket_url: "ws://relay:8081/v1/ws/bridge"
  token: "dev-relay-token"

security:
  pairing_ttl_seconds: 300
  default_scopes:
    - "cards:read"
    - "audit:read"
    - "notify:receive"

wol_targets:
  - id: "nas01"
    name: "NAS"
    mac: "02:00:5e:10:00:01"
    broadcast_ip: "192.168.1.255"
    udp_port: 9
    scopes:
      - "wol:wake:nas01"

cards:
  - id: "bridge_host"
    title: "Bridge Host"
    kind: "host_status"
    stale_after_seconds: 120
  - id: "nas_uptime"
    title: "NAS Uptime"
    kind: "generic_rest"
    stale_after_seconds: 300
    source:
      method: "GET"
      url: "https://status.example.local/api/status-page/heartbeat/main"
      json_path: "$.heartbeatList.nas[0].status"

actions:
  - id: "ack"
    title: "Ack"
    kind: "audit"
    scopes:
      - "notify:receive"
  - id: "wake_nas"
    title: "Wake NAS"
    kind: "wol"
    target_id: "nas01"
    requires_confirmation: true
    scopes:
      - "wol:wake:nas01"
