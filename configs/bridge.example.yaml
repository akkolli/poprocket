bridge:
  id: "bridge-dev"
  name: "Local Dev Bridge"
  public_url: "http://localhost:6567"
  direct_urls:
    - "http://localhost:6567"
    - "http://bridge.local:6567"
  data_path: "/var/lib/poprocket/poprocket.db"

relay:
  url: "http://relay:8081"
  websocket_url: "ws://relay:8081/v1/ws/bridge"
  token: "dev-relay-token"

security:
  pairing_ttl_seconds: 300
  default_scopes:
    - "cards:read"
    - "audit:read"
    - "notify:receive"
    - "monitor:read"
    - "monitor:write"
    - "wol:read"
    - "wol:manage"
    - "wol:wake:*"
    - "command:run"

command_runner:
  enabled: false
  allow_ad_hoc: false
  shell: "/bin/sh"
  timeout_seconds: 30
  max_output_bytes: 4096
  allowed_prefixes: []

wol_targets: []

cards: []

actions:
  - id: "ack"
    title: "Ack"
    kind: "audit"
    scopes:
      - "notify:receive"
