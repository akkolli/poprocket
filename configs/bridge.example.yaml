bridge:
  id: "bridge-dev"
  name: "PopRocket Dev Bridge"
  public_url: "http://localhost:8080"
  direct_urls:
    - "http://localhost:8080"
    - "http://bridge.local:8080"
  data_path: "/var/lib/poprocket/poprocket.db"

relay:
  url: "http://relay:8081"
  websocket_url: "ws://relay:8081/v1/ws/bridge"
  token: "dev-relay-token"

security:
  pairing_ttl_seconds: 300
  default_scopes:
    - "cards:read"
    - "audit:read"
    - "notify:receive"
    - "wol:wake:*"

wol_targets: []

cards: []

actions:
  - id: "ack"
    title: "Ack"
    kind: "audit"
    scopes:
      - "notify:receive"
