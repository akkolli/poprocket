name: ${POPROCKET_COMPOSE_PROJECT:-poprocket-bridge}

services:
  bridge:
    container_name: ${POPROCKET_BRIDGE_CONTAINER:-poprocket-bridge}
    build:
      context: ../../services/bridge
    image: poprocket-bridge:local
    network_mode: host
    user: "0:0"
    restart: unless-stopped
    environment:
      POPROCKET_BRIDGE_CONFIG: "/etc/poprocket/bridge.yaml"
      POPROCKET_BRIDGE_ADDR: ":6567"
    volumes:
      - ./local/bridge.yaml:/etc/poprocket/bridge.yaml:ro
      - ${HOME}/.ssh:/root/.ssh:ro
      - poprocket-bridge-data:/var/lib/poprocket

volumes:
  poprocket-bridge-data:
    name: ${POPROCKET_BRIDGE_VOLUME:-poprocket-bridge-data}
